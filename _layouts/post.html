---
layout: default
---

<section class="page-hero">
  <div class="container">
    <p class="section-label">Scripture Examined</p>
    <h1>{{ page.title }}</h1>
    <p class="page-intro">{{ page.date | date: "%B %-d, %Y" }}</p>
  </div>
</section>

<section class="post-page-section">
  <div class="container">
    <article class="post-article">
      {% if page.categories and page.categories.size > 0 %}
      <div class="post-categories">
        {% for category in page.categories %}
        <span class="blog-chip">{{ category }}</span>
        {% endfor %}
      </div>
      {% endif %}

      <div class="post-content">{{ content }}</div>
    </article>
  </div>
</section>
